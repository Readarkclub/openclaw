<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPENCLAW // AI NEWS FEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e27;
            --bg-card: #141b3d;
            --accent-cyan: #00fff5;
            --accent-pink: #ff006e;
            --accent-yellow: #ffbe0b;
            --text-primary: #e8f4f8;
            --text-dim: #8892b0;
            --border: rgba(0, 255, 245, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Mono', monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 245, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        header { margin-bottom: 80px; text-align: center; }
        .status-badge {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            padding: 8px 16px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 8s ease infinite;
            background-size: 200% 200%;
        }
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .subtitle { font-size: 1.1rem; color: var(--text-dim); max-width: 600px; margin: 0 auto; }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }
        .news-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .news-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-pink));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }
        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 40px rgba(0, 255, 245, 0.2);
        }
        .news-card:hover::before { transform: scaleX(1); }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .category {
            display: inline-block;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
            padding: 4px 12px;
            text-transform: uppercase;
        }
        .news-date {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .news-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .news-summary {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .news-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent-cyan);
            text-decoration: none;
            transition: gap 0.3s ease;
        }
        .news-link:hover { gap: 12px; }
        .news-link::after { content: '→'; font-size: 1.2rem; }
        footer {
            margin-top: 100px;
            padding: 40px 0;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; gap: 20px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="status-badge">SYSTEM ONLINE</div>
            <h1>OPENCLAW</h1>
            <p class="subtitle">AI News Feed // Real-time Intelligence Stream</p>
        </header>
        <div class="news-grid" id="newsGrid"></div>
        <footer><p>OPENCLAW © 2026 // Powered by AI</p></footer>
    </div>
    <script>
        fetch('data.json?t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('newsGrid');
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="category">${item.category}</div>
                            <div class="news-date">${item.date}</div>
                        </div>
                        <h3 class="news-title">${item.title}</h3>
                        <p class="news-summary">${item.summary}</p>
                        <a href="${item.link}" class="news-link" target="_blank">查看详情</a>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => console.error('Failed to load:', err));
    </script>
</body>
</html>
