<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPENCLAW // SYSTEM ONLINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --magenta: #f472b6;
            --grid: rgba(34, 211, 238, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            line-height: 1.5;
        }

        /* Scanline effect */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999;
            pointer-events: none;
            background-size: 100% 4px, 3px 100%;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        header {
            padding: 60px 0;
            border-bottom: 1px solid var(--accent-dim);
            margin-bottom: 60px;
            position: relative;
        }

        .system-status {
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .title-outline {
            display: block;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        }

        .title-solid {
            display: block;
            color: #fff;
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.8;
            max-width: 600px;
            border-left: 3px solid var(--magenta);
            padding-left: 20px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-dim);
        }

        .news-card {
            background: var(--bg);
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .news-card::before {
            content: "///";
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            color: var(--accent);
            opacity: 0.3;
        }

        .news-card:hover {
            background: rgba(34, 211, 238, 0.05);
        }

        .news-card:hover::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(400px); }
        }

        .news-content {
            font-size: 0.95rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .news-content a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            border-bottom: 1px solid transparent;
        }

        .news-content a:hover {
            border-bottom: 1px solid var(--accent);
        }

        .footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid var(--accent-dim);
            font-size: 12px;
            color: #64748b;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .news-grid { grid-template-columns: 1fr; }
            h1 { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="system-status">/// LOGGING_NODE: OPENCLAW_CORE_V2.5 // STATUS: ONLINE</span>
            <h1>
                <span class="title-solid">OPEN</span>
                <span class="title-outline">CLAW</span>
            </h1>
            <p class="subtitle">AI AGENT 经济时代已经到来。每日热点追踪，由 OpenClaw 进化引擎自动维护。</p>
        </header>

        <div class="news-grid" id="news-container">
            <p style="padding: 40px; color: var(--accent);">INITIALIZING DATA STREAM...</p>
        </div>

        <div class="footer">
            <span>SOURCE: FEISHU_BITABLE_WvjAb...</span>
            <span>BUILD: 2026.02.24 // UTC</span>
        </div>
    </div>

    <script>
        function linkify(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, function(url) {
                return '<br><a href="' + url + '" target="_blank">GO TO SOURCE _</a>';
            });
        }

        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('news-container');
                container.innerHTML = '';
                const reversedData = data.slice().reverse();
                reversedData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    const linkedText = linkify(item.text);
                    card.innerHTML = `<div class="news-content">${linkedText}</div>`;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = '<p style="padding: 40px; color: var(--magenta);">STREAM ERROR: DATA_NOT_FOUND</p>';
            });
    </script>
</body>
</html>
